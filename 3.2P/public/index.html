<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>BMI Calculator</title>

  <!-- basic page information -->
  <meta name="description" content="BMI Calculator Web Application for SIT725 3.2P">
  <meta name="author" content="Gujun Lu">

  <!-- social sharing metadata -->
  <meta property="og:title" content="BMI Calculator">
  <meta property="og:type" content="website">
  <meta property="og:description" content="A simple BMI Calculator web app using Express and Materialize">

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <!-- icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- custom styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- navigation bar -->
  <nav>
    <div class="nav-wrapper teal">
      <div class="container">
        <a href="#" class="brand-logo">BMI App</a>
      </div>
    </div>
  </nav>

  <main class="main-body">
    <div class="container">

      <!-- page heading -->
      <div class="row">
        <div class="col s12 center-align">
          <h2 id="heading">BMI Calculator</h2>
          <p class="flow-text">
            Enter your height and weight to calculate your Body Mass Index.
          </p>
        </div>
      </div>

      <!-- input form card -->
      <div class="row">
        <div class="col s12 m8 offset-m2 l6 offset-l3">
          <div class="card">
            <div class="card-content">

              <span class="card-title center-align">Health Check</span>

              <!-- height input -->
              <div class="input-field">
                <input id="height" type="number" min="1" step="0.1">
                <label for="height">Height (cm)</label>
              </div>

              <!-- weight input -->
              <div class="input-field">
                <input id="weight" type="number" min="1" step="0.1">
                <label for="weight">Weight (kg)</label>
              </div>

              <!-- calculate button -->
              <div class="center-align">
                <a class="waves-effect waves-light btn teal" id="calculateBtn">
                  <i class="material-icons left">calculate</i>
                  Calculate BMI
                </a>
              </div>

            </div>

            <!-- result display -->
            <div class="card-content">
              <h5>Result</h5>
              <p id="result">Your BMI result will appear here.</p>
              <p id="status"></p>
            </div>

          </div>
        </div>
      </div>

      <!-- BMI category cards -->
      <div class="row">

        <!-- Underweight card -->
        <div class="col s12 m4">
          <div class="card">
            <div class="card-image">
              <img class="materialboxed" src="images/Underweight.png" alt="Underweight">
            </div>
            <div class="card-content center-align">
              <span class="card-title">Underweight</span>
              <p>BMI below 18.5</p>
            </div>
          </div>
        </div>

        <!-- Normal card -->
        <div class="col s12 m4">
          <div class="card">
            <div class="card-image">
              <img class="materialboxed" src="images/Normal.png" alt="Normal">
            </div>
            <div class="card-content center-align">
              <span class="card-title">Normal</span>
              <p>BMI 18.5 - 24.9</p>
            </div>
          </div>
        </div>

        <!-- Overweight card -->
        <div class="col s12 m4">
          <div class="card">
            <div class="card-image">
              <img class="materialboxed" src="images/Overweight.png" alt="Overweight">
            </div>
            <div class="card-content center-align">
              <span class="card-title">Overweight</span>
              <p>BMI 25+</p>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <!-- custom JS -->
  <script src="js/scripts.js"></script>

</body>
</html>
